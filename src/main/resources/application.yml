spring:
  application:
    name: springboot
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        "[jdbc.time_zone]": UTC
        "[format_sql]": true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
  web:
    error:
      include-binding-errors: always
      include-message: always

server:
  port: 8080
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  storage:
    base-path: ${APP_STORAGE_BASE_PATH:uploads}
  security:
    jwt:
      # 256-bit (32 byte) base64-encoded secret. Override in env via APP_SECURITY_JWT_SECRET.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtdGhpcy1pcy1ub3Qtc2VjdXJlLXNlY3JldC1rZXk=}
      issuer: springboot-template
      access-token-ttl-minutes: 60
      refresh-token-ttl-days: 14

logging:
  file:
    path: ${LOG_DIR:logs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/springboot_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    properties:
      hibernate:
        "[show_sql]": true

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    properties:
      hibernate:
        "[show_sql]": false
