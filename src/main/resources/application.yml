spring:
  application:
    name: ${APP_NAME:springboot}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: ${JPA_OPEN_IN_VIEW:false}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:validate}
    properties:
      hibernate:
        "[jdbc.time_zone]": ${JPA_TIME_ZONE:UTC}
        "[format_sql]": ${JPA_FORMAT_SQL:true}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: ${FLYWAY_BASELINE_ON_MIGRATE:true}
    locations: ${FLYWAY_LOCATIONS:classpath:db/migration}
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${MULTIPART_MAX_REQUEST_SIZE:12MB}
  web:
    error:
      include-binding-errors: always
      include-message: always

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: ${SPRINGDOC_SWAGGER_UI_PATH:/swagger-ui.html}
    operations-sorter: alpha
  api-docs:
    path: ${SPRINGDOC_API_DOCS_PATH:/v3/api-docs}

app:
  storage:
    base-path: ${APP_STORAGE_BASE_PATH:uploads}
  security:
    jwt:
      # 256-bit (32 byte) base64-encoded secret. ALWAYS override in env in production.
      secret: ${APP_SECURITY_JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2QtdGhpcy1pcy1ub3Qtc2VjdXJlLXNlY3JldC1rZXk=}
      issuer: ${APP_SECURITY_JWT_ISSUER:springboot-template}
      access-token-ttl-minutes: ${APP_SECURITY_JWT_ACCESS_TTL_MINUTES:60}
      refresh-token-ttl-days: ${APP_SECURITY_JWT_REFRESH_TTL_DAYS:14}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    capacity: ${APP_RATE_LIMIT_CAPACITY:60}
    refill-tokens: ${APP_RATE_LIMIT_REFILL_TOKENS:60}
    refill-period: ${APP_RATE_LIMIT_REFILL_PERIOD:PT1M}
    auth-capacity: ${APP_RATE_LIMIT_AUTH_CAPACITY:10}
    auth-refill-tokens: ${APP_RATE_LIMIT_AUTH_REFILL_TOKENS:10}
    auth-refill-period: ${APP_RATE_LIMIT_AUTH_REFILL_PERIOD:PT1M}
    auth-path-prefixes:
      - /api/v1/auth/
    include-path-prefixes:
      - /api/
    exclude-path-patterns:
      - /actuator/.*
      - .*/swagger-ui.*
      - /v3/api-docs.*
  audit:
    # Master switch: false disables capture, the @Auditable aspect, the async executor, and the read API.
    enabled: ${APP_AUDIT_ENABLED:true}
    # Independent toggle: keeps capture on while hiding GET /api/v1/audit-logs (set false to lock down the read API).
    expose-api: ${APP_AUDIT_EXPOSE_API:true}
    audit-all: ${APP_AUDIT_AUDIT_ALL:true}
    capture-request-body: ${APP_AUDIT_CAPTURE_REQUEST_BODY:true}
    capture-response-body: ${APP_AUDIT_CAPTURE_RESPONSE_BODY:true}
    max-body-length: ${APP_AUDIT_MAX_BODY_LENGTH:10000}
    include-path-prefixes:
      - /api/
    exclude-path-patterns:
      - /actuator/.*
      - .*/swagger-ui.*
      - /v3/api-docs.*
      - /api/v1/files/.*
    masked-fields:
      - password
      - passwordHash
      - currentPassword
      - newPassword
      - token
      - accessToken
      - refreshToken
      - secret
      - apiKey
      - authorization

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    "[com.template.springboot]": ${LOG_LEVEL_APP:DEBUG}
  file:
    path: ${LOG_DIR:logs}

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS:health,info,metrics}
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_DETAILS:when-authorized}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/springboot_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    properties:
      hibernate:
        "[show_sql]": ${JPA_SHOW_SQL:true}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    properties:
      hibernate:
        "[show_sql]": ${JPA_SHOW_SQL:false}
