<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 560px; margin: 24px auto; padding: 0 16px;">
    <h2 style="margin-bottom: 16px;">Welcome, {{firstName}}!</h2>
    <p>Your account at {{fromName}} is ready. You can sign in any time at:</p>
    <p style="text-align: center; margin: 32px 0;">
        <a href="{{appUrl}}"
           style="background: #2563eb; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600;">
            Open dashboard
        </a>
    </p>
    <p>If you didn't create this account, please ignore this message.</p>
    <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 32px 0;">
    <p style="font-size: 12px; color: #6b7280;">— {{fromName}}</p>
</body>
</html>
